services:
  ioc.api:
    build:
      context: .
      dockerfile: IOC.API/Dockerfile
    image: iocapi:latest
    container_name: ioc.api
    ports:
      - "5000:8080"
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=IOC;Username=postgres;Password=123456

  postgres:
    image: postgres:16
    container_name: ioc.postgres
    environment:
      POSTGRES_DB: IOC
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
